name: Reusable LaTeX Build

on:
  workflow_call:
    inputs:
      tex_file:
        description: 'TeX 文件名'
        required: true
        type: string
        default: 'main.tex'
      compiler:
        description: 'LaTeX 编译器 (xelatex, pdflatex, lualatex)'
        required: false
        type: string
        default: 'xelatex'
      scheme:
        description: 'TeX Live 安装方案 (full, small)'
        required: false
        type: string
        default: 'full'
      artifact_name:
        description: '构建产物名称'
        required: false
        type: string
        default: 'pdf-output'
      latexmk_flags:
        description: 'latexmk 额外参数'
        required: false
        type: string
        default: '-interaction=nonstopmode -halt-on-error'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/texlive-action@v3
        with:
          scheme: ${{ inputs.scheme }}
          run: |
            # 使用 latexmk 自动处理多次编译和参考文献
            latexmk -pdf -${{ inputs.compiler }} ${{ inputs.latexmk_flags }} ${{ inputs.tex_file }}

      - name: Upload PDF as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: main.pdf

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-log
          path: main.log
